items:
  - title: CarryPorter
    slug: carryporter
    period: 2026.01 - 2026.02
    role: Backend Leader
    summary: 보행 약자를 위한 호출형 로봇 서비스의 백엔드 아키텍처와 배차 흐름을 설계했습니다.
    description: 이벤트 기반 비동기 흐름 분리, MQTT 기반 실시간 메시징, Redis/Lua 기반 동시성 제어를 중심으로 구조를 다듬었습니다.
