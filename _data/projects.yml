    tags: [Spring Boot, MQTT, Redis, Lua]

  - title: Oh My Guide
    slug: oh-my-guide
    period: 2026.02 - 2026.04
    role: Infra Engineer
    summary: 외국인 대상 여행 가이드 서비스의 배포 자동화와 운영 관측성을 개선했습니다.
    description: Jenkins/Docker 기반 CI/CD 자동화, 이미지 경량화, Loki/Prometheus/Grafana 기반 모니터링 환경을 구축했습니다.
    image: /assets/images/projects/oh-my-guide.png
    tags: [Jenkins, Docker, Grafana, Loki]

  - title: 오손도손
    slug: osondoson
    period: 2026.04 - 2026.05
    role: Team Leader / Backend Engineer
    summary: 수어와 음성을 실시간 대화로 연결하는 양방향 번역 서비스의 서버 구조를 설계했습니다.
    description: WebSocket 기반 상태 관리, FastAPI 연동, 공통 응답·예외 스키마 설계를 통해 서비스 연결 흐름을 정리했습니다.
